  <script>
  async function renderSlides() {
    const list = document.getElementById('splide-list');
    list.innerHTML = '';

    const defaultItems = [];

    if (!localStorage.getItem('galleryItems')) {
      localStorage.setItem('galleryItems', JSON.stringify(defaultItems));
    }

    const stored = JSON.parse(localStorage.getItem('galleryItems') || '[]');
    const fallback = defaultItems;

    let serverItems = [];
    try {
      const resp = await fetch('/api/gallery');
      if (resp.ok) serverItems = await resp.json();
    } catch (e) {}

    const items = serverItems.concat(stored).concat(fallback);

    items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'splide__slide';

      const figure = document.createElement('figure');
      figure.style.margin = '0';
      figure.style.padding = '0';

      const img = document.createElement('img');
      img.alt = item.title || '';
      img.src = item.src;
      img.style.display = 'block';
      img.style.margin = '0 auto';

      figure.appendChild(img);

    if (item.title || item.description) {//写真以外はPDFにする？→PDF埋め込みならPDF.js？→ https://mtrad.co.jp/blog/2026/03/23/post-7993/
      const caption = document.createElement('figcaption');
      caption.style.textAlign = 'center';
      caption.style.padding = '8px';
      caption.innerHTML = `
        <strong>${item.title || ''}</strong>
        <div>
          プレイ人数: ${item.players ?? '不明'}<br>
          プレイ時間: ${item.playTime ?? '不明'}<br>
          勝利条件: ${item.winCondition ?? '不明'}
        </div>
        <div>${item.description || ''}</div>
      `;
      figure.appendChild(caption);

    }

      li.appendChild(figure);
      list.appendChild(li);
    });
  }

  document.addEventListener('DOMContentLoaded', async function () {
    await renderSlides();

    new Splide('#image-carousel', {
      type: 'loop',
      /*heightRatio: 0.75,*/
      autoplay: true,
      interval: 5000,
      pauseOnHover: true,
      pauseOnFocus: true,
      resetProgress: false,
      speed: 2000,
      easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',
      drag: true,
    }).mount();
  });
  </script>
